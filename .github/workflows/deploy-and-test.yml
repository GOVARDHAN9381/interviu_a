name: Live Deploy & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build Project
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          keep_files: true

      - name: Wait for GitHub Pages Deployment
        run: sleep 30 # Give GitHub Pages time to propagate

      - name: Verify Live URL
        run: npx wait-on https://GOVARDHAN9381.github.io/interviu_a/

      - name: Run Live Selenium Tests
        working-directory: ./frontend
        run: npm run e2e
        env:
          BASE_URL: https://GOVARDHAN9381.github.io/interviu_a/#/login

      - name: Generate Reports
        if: always()
        working-directory: ./frontend
        run: npm run report
        env:
          BASE_URL: https://GOVARDHAN9381.github.io/interviu_a/#/login

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Results
          path: frontend/Test Results/
