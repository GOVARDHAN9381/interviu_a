name: Live Deploy & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build Project
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        working-directory: ./frontend
        run: npx gh-pages -d dist -u "github-actions-bot <support+actions@github.com>"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for GitHub Pages Deployment
        run: sleep 30 # Give GitHub Pages time to propagate

      - name: Verify Live URL
        run: npx wait-on https://GOVARDHAN9381.github.io/interviu_a/

      - name: Run Live Selenium Tests
        working-directory: ./frontend
        run: npm run login
        env:
          BASE_URL: https://GOVARDHAN9381.github.io/interviu_a/

      - name: Generate Reports
        if: always()
        working-directory: ./frontend
        run: npm run report
        env:
          BASE_URL: https://GOVARDHAN9381.github.io/interviu_a/

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Results
          path: frontend/Test Results/
